<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#101a16"><title>El Último Brote V2</title><link rel="manifest" href="manifest.webmanifest?v=2.1"><link rel="stylesheet" href="style.css?v=2.1"></head><body>
